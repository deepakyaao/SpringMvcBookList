<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="container">
    <div class="card">

        <h1>Welcome Back</h1>
        <p>Login to your account</p>

        <form action="/login" method="post">

            <input
                type="text"
                name="email"
                placeholder="Email"
                required>

				<div class="password-container">
				    <input
				        type="password"
				        id="password"
				        name="password"
				        placeholder="Password"
				        required>

				    <span class="eye-icon" onclick="togglePassword()">
				        👁
				    </span>
				</div>
            <button type="submit">
                Login
            </button>

        </form>

        <div class="link">
            Don't have an account?
            <a href="/signup">Sign Up</a>
        </div>

    </div>
</div>

<script src="/js/login.js"></script>

</body>
</html>
