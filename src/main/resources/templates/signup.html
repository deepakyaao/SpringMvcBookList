<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>

    <link rel="stylesheet" href="/css/signup.css">

    <!-- ADDED: Bootstrap Icons CDN -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="container">
    <div class="card">

        <h1>Create Account</h1>
        <p>Join us today</p>

        <form action="/register" method="post">

            <input
                type="text"
                name="name"
                placeholder="Full Name"
                required>

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <!-- CHANGED: Wrapped password field inside div -->
            <div class="password-container">

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Password"
                    required>

                <!-- ADDED: Eye icon -->
                <i class="bi bi-eye-slash eye-icon"
                   id="togglePassword"
                   onclick="togglePassword()"></i>
				   
				   <img src="h"

            </div>

            <!-- CHANGED: Wrapped confirm password field inside div -->
            <div class="password-container">

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required>

                <!-- ADDED: Eye icon -->
                <i class="bi bi-eye-slash eye-icon"
                   id="toggleConfirmPassword"
                   onclick="toggleConfirmPassword()"></i>

            </div>

            <button type="submit">
                Sign Up
            </button>

        </form>

        <div class="link">
            Already have an account?
            <a href="/login">Login</a>
        </div>

    </div>
</div>

<script src="/js/signup.js"></script>

</body>
</html>
