<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" href="/css/bookView.css">
	<script src="/js/bookView.js"></script>
	
	</head>
  <body>
	
		
		<div class="container">
			<h1>Books Info</h1>
			<div sec:authorize="hasRole('ADMIN')">
			    <a href="addBook" class="btn btn-primary">Add New Book</a>
			</div>
			<table class="table table-bordered">
				<thead>
					<tr>
					 
					 <th>BookId</th>
					 <th>BookName</th>
					 <th>BookPrice</th>
					 <th>AuthorName</th>
					 <th>Action</th>
					</tr>
				</thead>
					<tbody>
						<tr th:each="b : ${book}">
							       
						           <td th:text="${b.bookId}"></td>
						           <td th:text="${b.bookName}"></td>
						           <td th:text="${b.bookPrice}"></td>
								   <td th:text="${b.authorName}"></td>
								   <td>

								       <div sec:authorize="hasRole('ADMIN')">

								           <a th:href="@{/edit?(bookId=${b.bookId})}"
								              class="btn btn-secondary">
								              Edit
								           </a>

								           <a th:href="@{/delete?(bookId=${b.bookId})}"
								              class="btn btn-danger"
								              onclick="return confirmDelete()">
								              Delete
								           </a>

								       </div>
									   
									   <!-- USER BUTTONS -->
									   <div sec:authorize="hasRole('USER')">

									      <a th:href="@{/cart/add(bookId=${b.bookId})}"
									         class="btn btn-success">
									          Add To Cart
									      </a>

									      <a th:href="@{/buyNow(bookId=${b.bookId})}"
									         class="btn btn-warning">
									         Buy Now
									       </a>

									    </div>

								   </td>
						</tr>
						<tr>
							<div th:if="${#lists.isEmpty(book)}">
								<td colspan="5" style="text-align: center;">No books available.</td>
							</div>
						</tr>
					</tbody>
			</table>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
