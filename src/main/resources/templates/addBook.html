<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" href="/css/addBook.css">
	</head>
  <body>
    <h1>Book Form</h1>
	<div class="container">
		<p th:text ="${successMsg}" style="color : forestgreen;"></p>
		<p th:text="${errMsg}"></p>
		<form th:action="@{/saveBook}" th:object="${book}" method="post">
		<table class="table">
			
			<tr>
				<td>Book Name</td>
				<td><input type="text" th:field="*{bookName}"></td>
				<td><input type="hidden" th:field="*{bookId}"></td>
			</tr>
			<tr>
				<td>Book Price</td>
				<td><input type="number" th:field="*{bookPrice}"></td>
			</tr>
			<tr>
				<td>Author Name</td>
				<td><input type="text" th:field="*{authorName}"></td>
			</tr>
			<tr>
				<td></td>
				<td><input type="submit" value="Save" class="btn btn-primary"></td>
				</tr>
			
			  </table>
			</form>
			
			<a href="viewBooks">View All Books</a>
			
	</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
